name: Build and deploy React + FastAPI app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Build React frontend
      # -----------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend build into FastAPI static directory
        run: |
          rm -rf backend/app/static
          mkdir -p backend/app/static
          cp -R frontend/dist/. backend/app/static/

      # -----------------------------
      # Validate Python backend
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test application
        run: |
          python -c "from app.main import app; assert any(route.path == '/' for route in app.routes)"
        env:
          PYTHONPATH: backend

      # Optional validation
      - name: Verify deployment files
        run: |
          echo "Project files:"
          find . -maxdepth 3 -type f | sort | head -200

          echo "Frontend build:"
          ls -la frontend/dist

          echo "Backend:"
          ls -la backend

      # -----------------------------
      # Create deployment artifact
      # -----------------------------
      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: |
            .
            !.git/
            !.github/
            !frontend/node_modules/
            !antenv/
            !venv/
            !__pycache__/
            !**/__pycache__/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "dileepsamaji"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_177E80AACC5948CA8025AE0B589F21F5 }}
          package: .
          startup-command: gunicorn --bind=0.0.0.0:8000 --workers=2 --worker-class=uvicorn.workers.UvicornWorker --chdir backend app.main:app
